services:

  web:
    build: .
    container_name: django-api

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - redis

    environment:
      DB_NAME: urlshortener
      DB_USER: postgres
      DB_PASSWORD: postgre
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis

  postgres:
    image: postgres:16

    container_name: postgres-db

    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgre

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest

    container_name: redis-cache

    ports:
      - "6379:6379"

volumes:
  postgres_data: